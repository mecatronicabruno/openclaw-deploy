version: "3.9"

# =============================================================================
# OpenClaw – Docker Swarm Stack
# Segurança: Docker Secrets para credenciais, bind loopback, sandbox ativo
# Economia de tokens: roteamento por tier (Haiku → Sonnet → Opus)
# =============================================================================

networks:
  openclaw_internal:
    driver: overlay
    internal: true
    attachable: false
  network_public:
    external: true           # rede do Traefik (mesma do drome-web-php)

volumes:
  openclaw_config:
    driver: local
  openclaw_workspace:
    driver: local

secrets:
  openclaw_gateway_token:
    external: true
  anthropic_api_key:
    external: true
  openrouter_api_key:
    external: true
  # Secrets opcionais: descomente apenas os que você criou no deploy.sh
  # openai_api_key:
  #   external: true
  # telegram_bot_token:
  #   external: true
  # discord_bot_token:
  #   external: true
  # slack_bot_token:
  #   external: true

configs:
  openclaw_config_json:
    file: ./openclaw.json    # configuração principal (não contém segredos)

services:

  # ---------------------------------------------------------------------------
  # Gateway principal
  # ---------------------------------------------------------------------------
  gateway:
    image: ${OPENCLAW_IMAGE:-openclaw-swarm:local}
    entrypoint: ["/entrypoint.sh"]
    command: ["node", "openclaw.mjs", "gateway"]

    networks:
      - openclaw_internal
      - network_public

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro  # só se sandbox ativo

    configs:
      - source: openclaw_config_json
        target: /home/node/.openclaw/openclaw.json
        uid: "1000"
        gid: "1000"
        mode: 0400            # somente leitura pelo dono

    secrets:
      - openclaw_gateway_token
      - anthropic_api_key
      - openrouter_api_key
      # Descomente conforme os secrets opcionais que você criou:
      # - openai_api_key
      # - telegram_bot_token
      # - discord_bot_token
      # - slack_bot_token

    # O entrypoint.sh carrega os secrets como variáveis de ambiente
    # Nenhuma credencial fica em texto plano no stack file
    environment:
      - NODE_ENV=production
      - OPENCLAW_TZ=America/Sao_Paulo
      - OPENCLAW_DISABLE_BONJOUR=true
      - OPENCLAW_SANDBOX=1

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager   # ou específico: node.labels.openclaw == true
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      labels:
        - "traefik.enable=true"
        # HTTP → HTTPS redirect (mesmo padrão do drome-web-php)
        - "traefik.http.routers.openclaw.rule=Host(`openclaw.drome.com.br`)"
        - "traefik.http.routers.openclaw.entrypoints=web"
        - "traefik.http.middlewares.openclaw-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.openclaw-redirect.redirectscheme.permanent=true"
        - "traefik.http.routers.openclaw.middlewares=openclaw-redirect@docker"
        # HTTPS com TLS
        - "traefik.http.routers.openclaw-secure.rule=Host(`openclaw.drome.com.br`)"
        - "traefik.http.routers.openclaw-secure.entrypoints=websecure"
        - "traefik.http.routers.openclaw-secure.tls=true"
        - "traefik.http.routers.openclaw-secure.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.openclaw-secure.service=openclaw"
        - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
        # Rate limit
        - "traefik.http.middlewares.openclaw-ratelimit.ratelimit.average=30"
        - "traefik.http.middlewares.openclaw-ratelimit.ratelimit.burst=50"
        - "traefik.http.routers.openclaw-secure.middlewares=openclaw-ratelimit"

    # Proteção extra de capabilities do container
    # Nota: Docker Swarm não suporta "cap_drop" diretamente; use security_opt
    # para ambientes Kubernetes adicione securityContext equivalente
